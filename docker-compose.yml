services:
  postgres:
    image: postgres:15-alpine
    container_name: gymos_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: gymos_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gymos_pass_2024}
      POSTGRES_DB: gymos_india
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - gymos_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gymos_user -d gymos_india"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: gymos_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_gymos_2024}
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - gymos_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gymos_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://gymos_user:${POSTGRES_PASSWORD:-gymos_pass_2024}@postgres:5432/gymos_india
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_gymos_2024}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      PORT: 3001
    ports:
      - "127.0.0.1:3001:3001"
    volumes:
      - backend_uploads:/app/uploads
    networks:
      - gymos_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gymos_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001/api/v1}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:3001}
      NEXT_PUBLIC_RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - gymos_network

  nginx:
    image: nginx:alpine
    container_name: gymos_nginx
    restart: unless-stopped
    profiles:
      - production
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf
      - ./docker/ssl:/etc/nginx/ssl
    networks:
      - gymos_network

volumes:
  postgres_data:
  redis_data:
  backend_uploads:

networks:
  gymos_network:
    driver: bridge
