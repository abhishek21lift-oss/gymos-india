version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: gymos_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: gymos_user
      POSTGRES_PASSWORD: gymos_pass_2024
      POSTGRES_DB: gymos_india
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - gymos_network

  redis:
    image: redis:7-alpine
    container_name: gymos_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass redis_gymos_2024
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - gymos_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gymos_backend
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://gymos_user:gymos_pass_2024@postgres:5432/gymos_india
      REDIS_URL: redis://:redis_gymos_2024@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
      WHATSAPP_API_TOKEN: ${WHATSAPP_API_TOKEN}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID}
      MSG91_API_KEY: ${MSG91_API_KEY}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET}
      AWS_REGION: ap-south-1
      PORT: 3001
    ports:
      - "3001:3001"
    volumes:
      - ./backend/uploads:/app/uploads
    networks:
      - gymos_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gymos_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://backend:3001}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://backend:3001}
      NEXT_PUBLIC_RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
    ports:
      - "3000:3000"
    networks:
      - gymos_network

  nginx:
    image: nginx:alpine
    container_name: gymos_nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf
      - ./docker/ssl:/etc/nginx/ssl
    networks:
      - gymos_network

volumes:
  postgres_data:
  redis_data:

networks:
  gymos_network:
    driver: bridge
